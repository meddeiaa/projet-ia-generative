<div class="container">
  
  <!-- ===== HEADER ===== -->
  <header class="header">
    <h1>🤖 IA Générative</h1>
    <p class="subtitle">Générez du texte, des images et des vidéos avec l'IA</p>
  </header>

  <!-- ===== FORMULAIRE ===== -->
  <main class="main">
    
    <!-- Zone de saisie du prompt -->
    <section class="input-section">
      <label for="prompt" class="label">Entrez votre prompt :</label>
      <textarea
        id="prompt"
        [(ngModel)]="prompt"
        placeholder="Ex: Un chat astronaute explorant une planète colorée..."
        class="textarea"
        rows="3"
      ></textarea>
    </section>

    <!-- Sélection du type -->
    <section class="type-section">
      <p class="label">Type de génération :</p>
      <div class="type-buttons">
        <button 
          (click)="selectType('text')" 
          [class.active]="selectedType === 'text'"
          class="type-btn"
        >
          📝 Texte
        </button>
        <button 
          (click)="selectType('image')" 
          [class.active]="selectedType === 'image'"
          class="type-btn"
        >
          🖼️ Image
        </button>
        <button 
          (click)="selectType('video')" 
          [class.active]="selectedType === 'video'"
          class="type-btn"
        >
          🎬 Vidéo
        </button>
      </div>
    </section>

    <!-- Bouton générer -->
    <section class="generate-section">
      <button 
        (click)="generate()" 
        [disabled]="isLoading || !prompt.trim()"
        class="generate-btn"
      >
        <span *ngIf="!isLoading">🚀 Générer</span>
        <span *ngIf="isLoading">⏳ Génération en cours...</span>
      </button>
    </section>

    <!-- Message d'erreur -->
    <div *ngIf="error" class="error-message">
      ❌ {{ error }}
    </div>

    <!-- Indicateur de chargement -->
    <div *ngIf="isLoading" class="loading">
      <div class="spinner"></div>
      <p>
        <span *ngIf="selectedType === 'text'">Génération du texte...</span>
        <span *ngIf="selectedType === 'image'">Génération de l'image (~30 secondes)...</span>
        <span *ngIf="selectedType === 'video'">Génération de la vidéo (~2-3 minutes)...</span>
      </p>
    </div>

    <!-- ===== RÉSULTATS ===== -->
    <section *ngIf="result || videoUrl" class="result-section">
      <div class="result-header">
        <h2>✨ Résultat</h2>
        <button (click)="download()" class="download-btn">
          ⬇️ Télécharger
        </button>
      </div>

      <!-- Résultat texte -->
      <div *ngIf="selectedType === 'text' && result" class="result-text">
        <p>{{ result }}</p>
      </div>

      <!-- Résultat image -->
      <div *ngIf="selectedType === 'image' && result" class="result-image">
        <img [src]="result" alt="Image générée" />
      </div>

      <!-- Résultat vidéo -->
      <div *ngIf="selectedType === 'video' && videoUrl" class="result-video">
        <video controls [src]="videoUrl">
          Votre navigateur ne supporte pas la lecture vidéo.
        </video>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>Propulsé par Groq (LLaMA 3) et HuggingFace (SDXL)</p>
  </footer>

</div>
